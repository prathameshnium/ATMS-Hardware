name: Documentation Correction
description: Report errors in the wiring diagrams, BOM, or assembly guides.
title: "[DOC]: "
labels: ["documentation", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve the ATMS documentation!
  - type: textarea
    id: description
    attributes:
      label: Description of the Error
      description: Which file or diagram contains the error?
      placeholder: e.g. The resistor value in BOM.csv row 4 does not match the schematic.
    validations:
      required: true

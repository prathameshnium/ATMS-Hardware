name: OSHWA Compliance Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  compliance-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Check for LICENSE file
        run: |
          if [ -f "LICENSE" ]; then
            echo "LICENSE file found."
          else
            echo "CRITICAL: LICENSE file missing. OSHWA requirement failed."
            exit 1
          fi

      - name: Check for OSHWA UID or Pending Status
        run: |
          # Grep for 'OSHWA' or specific UID pattern in README
          if grep -q "OSHWA" README.md || grep -q "IN000" README.md; then
             echo "OSHWA reference found in README."
          else
             echo "WARNING: No OSHWA UID or reference found in README."
             # We don't exit 1 here yet, just warn, until you get the UID.
          fi

      - name: Check BOM Existence
        run: |
          # Checks if at least one CSV exists in the modules or bom folder
          count=$(find . -name "*.csv" | wc -l)
          if [ "$count" -gt 0 ]; then
            echo "BOM files found ($count)."
          else
            echo "CRITICAL: No Bill of Materials (CSV) found."
            exit 1
          fi
